networks:
  city-pulse-network:
    driver: bridge

services:
  postgres:
    image: postgres:18-alpine
    container_name: city-pulse-postgres
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5433:5432"
    networks:
      - city-pulse-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    image: denys1204/city-pulse-auth-service:${AUTH_SERVICE_VERSION:-latest}
    container_name: city-pulse-auth-service
    expose:
      - "8081"
    networks:
      - city-pulse-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=dev_user
      - SPRING_DATASOURCE_PASSWORD=dev_password

  api-gateway:
    build:
      context: ./backend/api-gateway
    image: denys1204/city-pulse-api-gateway:latest
    container_name: city-pulse-api-gateway
    ports:
      - "8080:8080"
    networks:
      - city-pulse-network
    depends_on:
      - auth-service

volumes:
  postgres_data: