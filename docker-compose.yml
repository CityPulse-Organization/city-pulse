networks:
  city-pulse-network:
    driver: bridge

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:18-alpine
    container_name: city-pulse-postgres
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5433:5432"
    networks:
      - city-pulse-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: city-pulse-minio
    environment:
      MINIO_ROOT_USER: dev_minio_user
      MINIO_ROOT_PASSWORD: dev_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - city-pulse-network
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: city-pulse-minio-init
    networks:
      - city-pulse-network
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 dev_minio_user dev_minio_password;
      /usr/bin/mc mb --ignore-existing myminio/citypulse-local-bucket;
      /usr/bin/mc anonymous set download myminio/citypulse-local-bucket;
      exit 0;
      "

  # --- Microservices ---
  auth-service:
    image: denys1204/city-pulse-auth-service:${AUTH_SERVICE_VERSION:-latest}
    container_name: city-pulse-auth-service
    expose:
      - "8081"
    networks:
      - city-pulse-network
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env-auth

  post-service:
    image: denys1204/city-pulse-post-service:${POST_SERVICE_VERSION:-latest}
    container_name: city-pulse-post-service
    expose:
      - "8082"
    networks:
      - city-pulse-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env-post

  api-gateway:
    image: denys1204/city-pulse-api-gateway:${API_GATEWAY_VERSION:-latest}
    container_name: city-pulse-api-gateway
    ports:
      - "8080:8080"
    networks:
      - city-pulse-network
    depends_on:
      - auth-service
      - post-service

volumes:
  postgres_data:
  minio_data: