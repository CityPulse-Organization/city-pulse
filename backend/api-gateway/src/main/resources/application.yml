server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service-route
              uri: http://auth-service:8081
              predicates:
                - Path=/api/v1/auth/**, /api/v1/oauth2/**

            - id: auth-service-openapi
              uri: http://auth-service:8081
              predicates:
                - Path=/v3/api-docs/auth
              filters:
                - RewritePath=/v3/api-docs/auth, /v3/api-docs

            - id: post-service-route
              uri: http://post-service:8082
              predicates:
                - Path=/api/v1/posts/**, /api/v1/comments/**

            - id: post-service-openapi
              uri: http://post-service:8082
              predicates:
                - Path=/v3/api-docs/post
              filters:
                - RewritePath=/v3/api-docs/post, /v3/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth

      - name: Post Service
        url: /v3/api-docs/post