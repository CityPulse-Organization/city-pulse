spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/post_db
    username: dev_user
    password: dev_password
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8081/api/v1/auth/.well-known/jwks.json
          issuer-uri: http://auth-service:8081
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

storage:
  endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
  access-key: ${STORAGE_ACCESS_KEY:dev_minio_user}
  secret-key: ${STORAGE_SECRET_KEY:dev_minio_password}
  bucket: ${STORAGE_BUCKET:citypulse-local-bucket}
