spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/post_db
    username: dev_user
    password: dev_password
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://127.0.0.1:8080/api/v1.0/auth/.well-known/jwks.json
          issuer-uri: localhost:8080
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

firebase:
  baseurl: https://storage.googleapis.com
  service-account:
    path: classpath:db/data/firebase-service-account.json
  bucket:
    name: citypulse-post-service.firebasestorage.app
