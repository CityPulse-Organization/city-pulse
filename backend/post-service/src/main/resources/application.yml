app:
  api:
    version: v1
  base-path: /api/${app.api.version}
  firebase:
    config: ${FIREBASE_CONFIG:classpath:db/data/firebase-service-account.json}

firebase:
  baseurl: https://storage.googleapis.com
  bucket:
    name: citypulse-post-service.firebasestorage.app

spring:
  application:
    name: post-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${APP_PORT:8082}

logging:
  level:
    org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer: ERROR